version: "3.8"

# 基础版：CPU 运行，适合无显卡用户
# 启动命令：docker compose up -d

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=change-this-secret-key
      - DEFAULT_MODELS=qwen2.5:7b
      - ENABLE_SIGNUP=true
      - ENABLE_LOGIN_FORM=true

  # 自动拉取默认模型
  model-puller:
    image: curlimages/curl:latest
    container_name: model-puller
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    command: >
      sh -c "
        echo '正在下载 DeepSeek-R1:7B 模型（约 4.7GB，请耐心等待）...' &&
        curl -X POST http://ollama:11434/api/pull -d '{\"name\":\"deepseek-r1:7b\"}' &&
        echo '模型下载完成！'
      "

volumes:
  ollama_data:
  open_webui_data:
